<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — 页面未找到 | Cookie the Yorkie</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="cookie.png" type="image/png">
  <meta name="robots" content="noindex">
  <script>
    (function(){var t=localStorage.getItem('theme');if(t==='light'||t==='dark'){document.documentElement.setAttribute('data-theme',t);}})();
  </script>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">Cookie 🐾</a>
      <div class="nav-links">
        <a href="/">首页</a>
        <a href="blog/">文章</a>
        <a href="about.html">关于</a>
      </div>
      <div class="nav-actions">
        <button class="theme-toggle" aria-label="切换主题"><span class="icon">🌙</span></button>
      </div>
    </div>
  </nav>

  <main>
    <section class="error-page">
      <div class="container-narrow">
        <h1>404</h1>
        <p>抱歉，你访问的页面不存在。</p>
        <p style="font-size: 0.9375rem; color: var(--text-tertiary); margin-bottom: var(--spacing-xl);">
          也许我把这页埋到院子里了，也许链接被我咬坏了……汪汪！
        </p>
        <a href="/" class="btn btn-primary">返回首页</a>
      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
